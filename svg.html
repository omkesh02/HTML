<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doraemon SVG</title>
<style>
    body{
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f0f8ff;
    }
    svg{
        width:500px;
        height:500px;
    }
</style>
</head>
<body>

<svg viewBox="0 0 500 500">

    <!-- Head -->
    <circle cx="250" cy="220" r="150" fill="#00AEEF" stroke="#000" stroke-width="4"/>

    <!-- Face -->
    <circle cx="250" cy="250" r="120" fill="white" stroke="#000" stroke-width="3"/>

    <!-- Eyes -->
    <ellipse cx="225" cy="155" rx="28" ry="38" fill="white" stroke="#000" stroke-width="2"/>
    <ellipse cx="275" cy="155" rx="28" ry="38" fill="white" stroke="#000" stroke-width="2"/>

    <!-- Pupils -->
    <circle cx="235" cy="170" r="7" fill="black"/>
    <circle cx="265" cy="170" r="7" fill="black"/>

    <!-- Nose -->
    <circle cx="250" cy="200" r="15" fill="red" stroke="#000" stroke-width="2"/>

    <!-- Nose line -->
    <line x1="250" y1="215" x2="250" y2="290" stroke="black" stroke-width="2"/>

    <!-- Mouth -->
    <path d="M170 250 Q250 340 330 250"
          fill="none"
          stroke="black"
          stroke-width="3"/>

    <!-- Whiskers -->
    <line x1="120" y1="210" x2="210" y2="220" stroke="black" stroke-width="2"/>
    <line x1="120" y1="240" x2="210" y2="240" stroke="black" stroke-width="2"/>
    <line x1="120" y1="270" x2="210" y2="260" stroke="black" stroke-width="2"/>

    <line x1="290" y1="220" x2="380" y2="210" stroke="black" stroke-width="2"/>
    <line x1="290" y1="240" x2="380" y2="240" stroke="black" stroke-width="2"/>
    <line x1="290" y1="260" x2="380" y2="270" stroke="black" stroke-width="2"/>

    <!-- Collar -->
    <rect x="150" y="350" width="200" height="25"
          fill="red"
          stroke="black"
          stroke-width="2"/>

    <!-- Bell -->
    <circle cx="250" cy="390" r="22"
            fill="#FFD700"
            stroke="black"
            stroke-width="2"/>
    <line x1="235" y1="390" x2="265" y2="390"
          stroke="black"
          stroke-width="2"/>
    <circle cx="250" cy="400" r="4" fill="black"/>

</svg>

</body>
</html>
