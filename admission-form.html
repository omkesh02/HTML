<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admission Form</title>
  <style>
    :root{--bg:#f4f7fb;--card:#ffffff;--accent:#0b5fff;--muted:#6b7280}
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:var(--bg);color:#071128}
    .wrap{max-width:880px;margin:36px auto;padding:20px}
    header{margin-bottom:18px}
    .card{background:var(--card);padding:20px;border-radius:10px;box-shadow:0 6px 18px rgba(7,17,40,0.06)}
    form{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    label{font-size:.9rem;color:var(--muted);display:block;margin-bottom:6px}
    input[type="text"],input[type="email"],input[type="tel"],input[type="date"],select,textarea,input[type="file"]{width:100%;padding:10px;border:1px solid #e6eef9;border-radius:8px}
    textarea{resize:vertical}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
    .btn{background:var(--accent);color:#fff;padding:10px 16px;border-radius:8px;border:none;cursor:pointer}
    .btn.secondary{background:#eef3ff;color:var(--accent)}
    .note{font-size:.85rem;color:var(--muted)}
    @media (max-width:720px){form{grid-template-columns:1fr} .actions{justify-content:stretch} .actions .btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Admission Form</h1>
      <p class="note">Fill out the details below. Fields marked * are required.</p>
    </header>

    <div class="card">
      <form id="admissionForm">
        <div>
          <label for="fullname">Full name *</label>
          <input id="fullname" name="fullname" type="text" required placeholder="Jane Doe" />
        </div>

        <div>
          <label for="dob">Date of birth *</label>
          <input id="dob" name="dob" type="date" required />
        </div>

        <div>
          <label for="gender">Gender</label>
          <select id="gender" name="gender">
            <option value="">Prefer not to say</option>
            <option>Female</option>
            <option>Male</option>
            <option>Non-binary</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label for="phone">Phone *</label>
          <input id="phone" name="phone" type="tel" required placeholder="+1 555 555 5555" />
        </div>

        <div class="full">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>

        <div class="full">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="2" placeholder="Street, City, State, ZIP"></textarea>
        </div>

        <div>
          <label for="course">Course applying for *</label>
          <select id="course" name="course" required>
            <option value="">Choose a course</option>
            <option>Bachelor of Science</option>
            <option>Bachelor of Arts</option>
            <option>Master of Science</option>
            <option>Diploma</option>
          </select>
        </div>

        <div>
          <label for="year">Intake year *</label>
          <input id="year" name="year" type="text" pattern="\d{4}" placeholder="2026" required />
        </div>

        <div>
          <label for="qualification">Previous qualification</label>
          <input id="qualification" name="qualification" type="text" placeholder="High School Diploma, etc." />
        </div>

        <div>
          <label for="transcript">Upload transcript (optional)</label>
          <input id="transcript" name="transcript" type="file" accept=".pdf,.jpg,.png" />
        </div>

        <div class="full">
          <label><input id="agree" name="agree" type="checkbox" required /> I confirm that the information provided is correct *</label>
        </div>

        <div class="full actions">
          <button type="button" class="btn secondary" onclick="document.getElementById('admissionForm').reset()">Reset</button>
          <button type="submit" class="btn">Submit Application</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('admissionForm').addEventListener('submit', function(e){
      e.preventDefault();
      const form = e.target;
      if(!form.checkValidity()){
        form.reportValidity();
        return;
      }
      // Demo behavior: collect data and show a confirmation
      const data = new FormData(form);
      const payload = {};
      for(const [k,v] of data.entries()) payload[k]=v;
      alert('Application submitted (demo).\nName: ' + payload.fullname + '\nCourse: ' + payload.course);
      form.reset();
    });
  </script>
</body>
</html>
